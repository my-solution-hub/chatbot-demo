name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ECR_REPO_PROXY: chatbot-demo-proxy
  ECR_REPO_AGENT: chatbot-demo-strands-agent

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PortAudio
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: cdk-deploy
          role-duration-seconds: 3600

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            infra/requirements.txt

      - name: Install Node.js (for CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r infra/requirements.txt

      # Step 1: Deploy ECR stack first
      - name: CDK Deploy - ECR Stack
        working-directory: infra
        run: cdk deploy ChatbotEcrStack --require-approval never

      # Step 2: Build and push Docker images to ECR
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push proxy image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_PROXY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPO_PROXY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPO_PROXY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_PROXY:latest
          docker push $ECR_REGISTRY/$ECR_REPO_PROXY:latest

      - name: Build and push Strands agent image (ARM64)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPO_AGENT:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO_AGENT:latest \
            --push \
            agents/strands/

      # Step 3: Deploy remaining stacks with the image tag
      - name: CDK Deploy - All remaining stacks
        working-directory: infra
        run: cdk deploy --all --require-approval never --concurrency 2 -c imageTag=${{ github.sha }}
